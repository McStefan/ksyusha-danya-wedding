name: Deploy static site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble static site
        shell: bash
        run: |
          mkdir -p public
          cp index.html public/
          [ -f style.css ] && cp style.css public/
          for dir in css js images fonts media; do
            if [ -d "$dir" ]; then
              cp -R "$dir" "public/$dir"
            fi
          done
          [ -f .nojekyll ] && cp .nojekyll public/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
